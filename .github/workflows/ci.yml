name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      # --- NEW STEP: Generate Astro Types ---
      - name: Sync Astro Types
        run: npx astro sync

      - name: Check TypeScript
        run: npx typescript --noEmit

      - name: Build the Astro Site
        run: npm run build

      # --- NEW DEPLOYMENT STEP ---
      - name: 📂 Sync files to Hostinger
        if: github.ref == 'refs/heads/main'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/ 
          
          # Target Hostinger's specific domain directory
          server-dir: /domains/cloudsecurityanalysis.com/public_html/
          
          port: 21
          # Fix the syntax warning
          security: loose

